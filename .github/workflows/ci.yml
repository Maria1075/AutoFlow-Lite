name: CI — AutoFlow Lite

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: PHP ${{ matrix.php }} · Laravel · Pest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2"]

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ── 2. PHP ───────────────────────────────────────────────────────
      - name: Configurar PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, pdo_mysql, xml, zip
          coverage: none

      # ── 3. Composer ───────────────────────────────────────────────────
      - name: Cache de dependencias Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ── 4. Entorno Laravel ───────────────────────────────────────────
      - name: Copiar .env de ejemplo
        run: cp .env.example .env

      - name: Generar APP_KEY
        run: php artisan key:generate

      # ── 5. Node.js + Vite ────────────────────────────────────────────
      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Instalar dependencias Node
        run: npm ci

      - name: Compilar assets con Vite
        run: npm run build

      # ── 6. Calidad de código ─────────────────────────────────────────
      - name: Verificar formato con Laravel Pint
        run: vendor/bin/pint --test

      # ── 7. Tests ─────────────────────────────────────────────────────
      # La BD es SQLite en memoria, configurada en phpunit.xml
      # No se necesita servidor MySQL en CI
      - name: Ejecutar suite de tests con Pest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: php artisan test --compact

      # ── 8. Resumen ───────────────────────────────────────────────────
      - name: Mostrar versiones del entorno
        if: always()
        run: |
          php --version
          composer --version
          node --version
          npm --version
